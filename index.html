<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tap His Face 😄</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #fff0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Bubbly background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      opacity: 0.18;
    }
    body::before {
      width: 340px; height: 340px;
      background: #ff85a1;
      top: -80px; left: -80px;
    }
    body::after {
      width: 280px; height: 280px;
      background: #ffb347;
      bottom: -60px; right: -60px;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 4vw, 32px);
      padding: clamp(12px, 4vw, 28px);
      width: 100%;
      height: 100vh;
      height: 100dvh;
      max-width: 520px;
      margin: 0 auto;
    }

    /* Caption */
    .caption {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      color: #d63384;
      text-align: center;
      line-height: 1.5;
      letter-spacing: 0.3px;
      transition: opacity 0.4s ease, transform 0.4s ease;
      min-height: 3rem;
      padding: 0 10px;
    }

    .caption.swap {
      opacity: 0;
      transform: translateY(-8px);
    }

    /* Image wrapper */
    .img-wrapper {
      position: relative;
      width: min(72vw, 72vh, 360px);
      height: min(72vw, 72vh, 360px);
      border-radius: 50%;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 6px solid #ff85a1;
      box-shadow: 0 8px 32px rgba(214, 51, 132, 0.22), 0 2px 8px rgba(0,0,0,0.08);
      display: block;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .img-wrapper:active img {
      transform: scale(0.94);
      box-shadow: 0 4px 16px rgba(214, 51, 132, 0.18);
    }

    /* Ripple ring on tap */
    .ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 3px solid #ff85a1;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      pointer-events: none;
    }
    .ring.pop {
      animation: ripple 0.55s ease-out forwards;
    }
    @keyframes ripple {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(1.45); opacity: 0; }
    }

    /* Floating hearts / stars burst */
    .burst {
      position: absolute;
      top: 50%; left: 50%;
      pointer-events: none;
      z-index: 10;
    }
    .particle {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      animation: float-up 0.9s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      60%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.2); }
    }

    /* Hint text */
    .hint {
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      color: #c77;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-top: -6px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="caption" id="caption">Tap on his face to make him happy 😊</div>

  <div class="img-wrapper" id="imgWrapper" onclick="handleTap(event)">
    <!-- ✅ REPLACE: change "pic1.jpg" and "pic2.jpg" to your actual image filenames -->
    <img id="faceImg" src="pic1.jpg" alt="Face" />
    <div class="ring" id="ring"></div>
  </div>

  <p class="hint">tap the photo ✨</p>
</div>

<script>
  const states = [
    {
      src: "pic1.jpg",          // ✅ your first image filename
      caption: "Tap on his face to make him happy 😊"
    },
    {
      src: "pic2.jpg",          // ✅ your second image filename
      caption: "Stop him from smiling 😂"
    }
  ];

  let current = 0;
  const img     = document.getElementById('faceImg');
  const caption = document.getElementById('caption');
  const ring    = document.getElementById('ring');
  const wrapper = document.getElementById('imgWrapper');

  const happyParticles  = ['❤️','😄','✨','🌟','💛','😁','💖'];
  const stopParticles   = ['😂','🛑','😭','💀','🤣','😤','🙈'];

  function handleTap(e) {
    // Switch state
    current = current === 0 ? 1 : 0;
    const next = states[current];

    // Ripple
    ring.classList.remove('pop');
    void ring.offsetWidth;
    ring.classList.add('pop');

    // Caption fade
    caption.classList.add('swap');
    setTimeout(() => {
      caption.textContent = next.caption;
      caption.classList.remove('swap');
    }, 350);

    // Image switch with a little bounce
    setTimeout(() => {
      img.src = next.src;
    }, 120);

    // Burst particles
    const emojis = current === 1 ? happyParticles : stopParticles;
    spawnParticles(emojis);
  }

  function spawnParticles(emojis) {
    const burst = document.createElement('div');
    burst.className = 'burst';
    wrapper.appendChild(burst);

    const count = 8;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      const angle = (360 / count) * i + Math.random() * 20;
      const dist  = 90 + Math.random() * 60;
      const rad   = angle * Math.PI / 180;
      const tx    = Math.cos(rad) * dist + 'px';
      const ty    = Math.sin(rad) * dist + 'px';

      p.style.setProperty('--tx', tx);
      p.style.setProperty('--ty', ty);
      p.style.animationDelay = (Math.random() * 0.15) + 's';
      burst.appendChild(p);
    }

    setTimeout(() => burst.remove(), 1200);
  }
</script>
</body>
</html>
